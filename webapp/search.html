<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Qidiruv — Kino App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/ios.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <header class="navbar"><div class="navbar__title">Qidiruv</div></header>

    <main class="page">
        <div class="search-bar">
            <svg class="search-bar__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>
            <input id="q" type="text" placeholder="Kino nomini yozing..." autocomplete="off" enterkeyhint="search">
            <button class="search-bar__clear" id="clear" style="visibility:hidden">✕</button>
        </div>

        <div id="results" style="margin-top:16px"></div>
    </main>

    <nav id="tabbar"></nav>

    <script src="js/telegram.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>App.boot('search');</script>
    <script src="js/search.js"></script>
</body>
</html>
